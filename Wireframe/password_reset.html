<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recuperar Contraseña - Pitahaya Vision</title>

    <!-- TailwindCSS -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&display=swap"
        rel="stylesheet">

    <style>
        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateY(24px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .fade-up {
            animation: fadeUp 0.65s cubic-bezier(0.22, 1, 0.36, 1) both;
        }

        .font-cormorant {
            font-family: "Cormorant Garamond", serif;
        }
    </style>
</head>

<body
    class="antialiased bg-white text-zinc-900 h-[100dvh] overflow-x-hidden overflow-y-auto lg:h-screen lg:overflow-hidden">

    <main>
        <section class="min-h-screen relative bg-white lg:h-screen">

            <section
                class="relative flex items-start lg:items-center justify-center px-4 sm:px-8 py-5 sm:py-7 lg:px-12 bg-white overflow-visible lg:overflow-hidden min-h-full lg:h-screen">

                <!-- Decoraciones -->
                <div
                    class="pointer-events-none absolute -right-24 top-16 size-80 rounded-full bg-gradient-to-br from-green-50 to-transparent opacity-70">
                </div>

                <div class="pointer-events-none absolute -right-28 top-12 h-[28rem] w-[28rem] rounded-full hidden lg:block"
                    style="background: radial-gradient(circle at center, rgba(187,247,208,0.55) 0%, rgba(220,252,231,0.3) 35%, rgba(255,255,255,0) 70%);">
                </div>

                <!-- Planta decorativa -->
                <svg class="absolute -bottom-3 -left-3 w-48 lg:w-56 opacity-30 pointer-events-none"
                    viewBox="0 0 220 280" xmlns="http://www.w3.org/2000/svg">

                    <path d="M40 270 C 40 190, 80 160, 65 70" stroke="#16a34a" stroke-width="2" fill="none"
                        stroke-linecap="round" />
                    <path d="M65 70 C 65 70, 20 50, 8 15" stroke="#16a34a" stroke-width="1.2" fill="none"
                        stroke-linecap="round" />
                    <path d="M65 70 C 65 70, 115 45, 130 8" stroke="#16a34a" stroke-width="1.2" fill="none"
                        stroke-linecap="round" />
                    <path d="M52 155 C 52 155, 8 142, -8 122" stroke="#16a34a" stroke-width="1" fill="none"
                        stroke-linecap="round" />
                    <path d="M52 155 C 52 155, 96 130, 120 112" stroke="#16a34a" stroke-width="1" fill="none"
                        stroke-linecap="round" />
                    <path d="M58 110 C 58 110, 16 94, 0 76" stroke="#16a34a" stroke-width="0.9" fill="none"
                        stroke-linecap="round" />
                    <path d="M58 110 C 58 110, 98 88, 122 72" stroke="#16a34a" stroke-width="0.9" fill="none"
                        stroke-linecap="round" />

                    <ellipse cx="130" cy="8" rx="13" ry="7.5" fill="#16a34a" opacity="0.55"
                        transform="rotate(-30 130 8)" />
                    <ellipse cx="-8" cy="122" rx="11" ry="6" fill="#16a34a" opacity="0.55"
                        transform="rotate(20 -8 122)" />
                    <ellipse cx="120" cy="112" rx="12" ry="6.5" fill="#16a34a" opacity="0.55"
                        transform="rotate(-15 120 112)" />
                    <ellipse cx="0" cy="76" rx="10" ry="5.5" fill="#16a34a" opacity="0.45"
                        transform="rotate(25 0 76)" />
                    <ellipse cx="122" cy="72" rx="11" ry="6" fill="#16a34a" opacity="0.45"
                        transform="rotate(-20 122 72)" />
                </svg>

                <!-- Contenido -->
                <article class="relative z-10 w-full max-w-md py-2 sm:py-3 lg:py-0 fade-up">

                    <!-- Logo -->
                    <header class="mb-8 flex items-center gap-3">

                        <figure
                            class="flex size-10 shrink-0 items-center justify-center rounded-lg bg-green-600 shadow-md shadow-green-600/20">

                            <svg class="size-5 fill-white" viewBox="0 0 24 24">
                                <path
                                    d="M17 8C8 10 5.9 16.17 3.82 21.34L5.71 22l1-2.3A4.49 4.49 0 0 0 8 20C19 20 22 3 22 3c-1 2-8 2-8 2 4-4 8.5-4 8.5-4-8 3.5-9 6-9 6A8 8 0 0 1 17 8z" />
                            </svg>

                        </figure>

                        <span class="text-2xl font-semibold text-zinc-900 font-cormorant">
                            Pitahaya Vision
                        </span>

                    </header>

                    <p class="mb-2 text-xs font-semibold uppercase tracking-widest text-green-600">
                        Sistema de diagnóstico inteligente
                    </p>

                    <h1 class="mb-2 text-3xl sm:text-4xl font-medium leading-tight text-zinc-900 font-cormorant">
                        Recupera tu <em class="italic text-green-600">contraseña</em>
                    </h1>

                    <p class="mb-5 sm:mb-6 text-sm font-light leading-relaxed text-zinc-500">
                        Ingresa el correo asociado a tu cuenta y te enviaremos un enlace para
                        restablecer tu contraseña.
                    </p>

                    <!-- Mensaje éxito (opcional) -->
                    <!--
                    <div class="mb-4 flex items-center gap-2 rounded-lg border border-green-200 bg-green-50 p-3 text-sm text-green-700">
                        <i class="fa-solid fa-circle-check"></i>
                        <span>Si el correo existe, te enviamos un enlace para restablecer la contraseña.</span>
                    </div>
                    -->

                    <!-- Mensaje error (opcional) -->
                    <!--
                    <div class="mb-4 flex items-center gap-2 rounded-lg border border-red-200 bg-red-50 p-3 text-sm text-red-600">
                        <i class="fa-solid fa-circle-xmark"></i>
                        <span>Error al enviar el correo.</span>
                    </div>
                    -->

                    <form class="space-y-4">

                        <fieldset>

                            <div
                                class="mb-3 mt-1 flex items-center gap-2 text-[0.68rem] font-semibold uppercase tracking-[0.12em] text-zinc-400">

                                <span>Datos de cuenta</span>

                                <div class="h-px flex-1 bg-zinc-200"></div>

                            </div>

                            <div>

                                <label class="mb-1.5 block text-xs font-semibold uppercase tracking-wider text-zinc-700"
                                    for="email">
                                    Correo electrónico
                                </label>

                                <div class="relative">

                                    <i
                                        class="fas fa-envelope pointer-events-none absolute left-3.5 top-1/2 -translate-y-1/2 text-sm text-zinc-400">
                                    </i>

                                    <input id="email" type="email" required placeholder="nombre@correo.com"
                                        class="w-full rounded-lg border border-zinc-200 py-2.5 pl-10 pr-4 text-sm text-zinc-900 outline-none transition-all duration-200 placeholder:text-zinc-400 hover:border-zinc-300 focus:border-green-600 focus:ring-2 focus:ring-green-100"
                                        style="background-color:#F2F4FB;" onfocus="this.style.backgroundColor='#ffffff'"
                                        onblur="this.style.backgroundColor='#F2F4FB'">

                                </div>

                            </div>

                        </fieldset>

                        <button type="submit"
                            class="mt-2 w-full rounded-lg bg-green-600 px-4 py-3 text-sm font-semibold tracking-wider text-white shadow-md shadow-green-600/20 transition-all duration-150 hover:-translate-y-0.5 hover:bg-green-700 hover:shadow-lg active:translate-y-0">

                            Enviar enlace

                        </button>

                    </form>

                    <footer class="mt-6 text-center text-sm text-zinc-500">

                        <a href="login.html" class="font-medium text-green-600 hover:text-green-700 hover:underline">

                            Volver al inicio de sesión

                        </a>

                    </footer>

                </article>

            </section>

        </section>
    </main>

</body>

</html>
